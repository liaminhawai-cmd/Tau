<text x="15.00" y="24.00" style="font-family:Arial;font-size:9px;fill:#333" text-anchor="start">Outer Ø302.5 drops into the box on top of the base. Thickness ≥ piece height 54 mm</text>
<text x="15.00" y="34.00" style="font-family:Arial;font-size:9px;fill:#333" text-anchor="start">(laminate 3×18 mm E-flute, or cut 55 mm EVA). Cavities hold both tripods feet-down; the</text>
<text x="15.00" y="44.00" style="font-family:Arial;font-size:9px;fill:#333" text-anchor="start">magnetic disk is already protected in the base below. Cavities traced from tripod_smoove_2021.stl.</text>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Tau — premium render spike</title>
<style>
  html,body { margin:0; height:100%; background:#0a0c10; overflow:hidden; }
  canvas { display:block; }
  #tag { position:fixed; left:10px; bottom:8px; color:#39404a; font:11px system-ui; user-select:none; }
</style>
</head>
<body>
<div id="tag">tau · premium spike — drag to orbit, scroll to zoom</div>
<script type="importmap">
{ "imports": { "three": "./vendor/three/three.module.js", "three/addons/": "./vendor/three/addons/" } }
</script>
<script type="module">
// Premium render spike for the Steam build: SAME game geometry (CFG dims from index.html),
// upgraded render path — glass pieces (MeshPhysicalMaterial transmission), slate board with
// brass-inlaid lines (procedural PBR canvas maps), soft shadow maps, image-based lighting
// (RoomEnvironment -> PMREM, no external assets), ACES tone mapping + gentle bloom.
// This page is a LOOK experiment only: no game logic, not linked from the game.
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ---- game dims (index.html CFG — keep in sync) ----------------------------------------------
const CFG = {
  edgeU: 66.667, rings: [40, 53.3],
  sideArcs: [ { cx:-66.667, cy:0, r:40, a0:-72.542, a1:72.542 },
              { cx: 66.667, cy:0, r:40, a0:107.458, a1:252.542 } ],
  lineWidthFrac: 0.0079, padRadiusFrac: 0.0082,
  footR: 23.095, hubHeight: 23.095, legRadius: 2.0, footPadFrac: 0.4, startX: 30.597,
};
CFG.footPadRadius = CFG.legRadius * CFG.footPadFrac;

// a real mid-game pose (coach replay, the tussle) — [bx,by,brot, rx,ry,rrot]
const POSE = [6.51, 3.12, 3.21, 18.85, -11.33, 0.84];

// ---- tunables (the taste knobs) --------------------------------------------------------------
const LOOK = {
  exposure: 1.05,
  bloom: { strength: 0.22, radius: 0.5, threshold: 0.9 },
  glass: { roughness: 0.12, thickness: 4.5, ior: 1.5, attDist: 6.0, clearcoat: 1.0 },
  blue: { tint: 0x7aa4ee, att: 0x3b74e8 }, red: { tint: 0xee7a6f, att: 0xe8483b },   // surface tint + body attenuation
  slate: { base:'#23262c', light:'#2d3138', dark:'#1a1c21', brass:'#a8843c', brassHi:'#d6b567' },
  key: { intensity: 2.6, pos: [70, 130, 45], shadow: 0.55 },
  rim: { color: 0x353a42, metalness: 0.85, roughness: 0.35 },
};

// ---- renderer / scene ------------------------------------------------------------------------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = LOOK.exposure;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0c10);

// image-based lighting from the procedural room — this is what makes the glass live
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 1, 3000);
camera.position.set(-18, 58, 122);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.target.set(0, 4, 0); controls.maxPolarAngle = Math.PI * 0.49;
controls.minDistance = 50; controls.maxDistance = 400;
controls.update();

// key light (shadows) + a cool low fill
const key = new THREE.DirectionalLight(0xfff1dc, LOOK.key.intensity);
key.position.set(...LOOK.key.pos);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = key.shadow.camera.bottom = -95;
key.shadow.camera.right = key.shadow.camera.top = 95;
key.shadow.camera.far = 400;
key.shadow.bias = -0.0004;
key.shadow.intensity = LOOK.key.shadow;    // r163+: soften the whole shadow, glass shouldn't throw ink
scene.add(key);
const fill = new THREE.DirectionalLight(0x8fb4ff, 0.5);
fill.position.set(-80, 40, -60); scene.add(fill);

// ---- slate board with brass-inlaid lines (procedural canvas PBR) -----------------------------
function noiseCanvas(S, amp) {   // layered soft blobs + fine grain -> value-noise-ish field
  const cv = document.createElement('canvas'); cv.width = cv.height = S;
  const c = cv.getContext('2d');
  c.fillStyle = '#808080'; c.fillRect(0, 0, S, S);
  let rng = 1234567;
  const rnd = () => (rng = (rng * 16807) % 2147483647) / 2147483647;
  for (let pass = 0; pass < 3; pass++) {
    const n = 42 * (pass + 1), r0 = S / (5 + pass * 6);
    for (let i = 0; i < n; i++) {
      const x = rnd()*S, y = rnd()*S, r = r0 * (0.5 + rnd()), v = rnd();
      const g = c.createRadialGradient(x, y, 0, x, y, r);
      const a = amp / (pass + 1);
      g.addColorStop(0, `rgba(${v > 0.5 ? 255 : 0},${v > 0.5 ? 255 : 0},${v > 0.5 ? 255 : 0},${a})`);
      g.addColorStop(1, 'rgba(128,128,128,0)');
      c.fillStyle = g; c.beginPath(); c.arc(x, y, r, 0, 7); c.fill();
    }
  }
  const img = c.getImageData(0, 0, S, S), d = img.data;   // fine grain
  for (let i = 0; i < d.length; i += 4) {
    const g = (rnd() - 0.5) * 22; d[i] += g; d[i+1] += g; d[i+2] += g;
  }
  c.putImageData(img, 0, 0);
  return cv;
}
function boardMaps() {
  const S = 2048, sc = S / (2 * CFG.edgeU), ox = S/2, oy = S/2;
  const px = u => u * sc;
  const albedo = document.createElement('canvas'); albedo.width = albedo.height = S;
  const a = albedo.getContext('2d');
  // slate base: base colour multiplied by the noise field
  a.fillStyle = LOOK.slate.base; a.fillRect(0, 0, S, S);
  a.globalCompositeOperation = 'soft-light';
  a.globalAlpha = 0.85; a.drawImage(noiseCanvas(S, 0.12), 0, 0);
  a.globalCompositeOperation = 'source-over'; a.globalAlpha = 1;
  // vignette toward the rim so the disc has depth
  const vg = a.createRadialGradient(ox, oy, px(CFG.edgeU)*0.35, ox, oy, px(CFG.edgeU));
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.34)');
  a.fillStyle = vg; a.fillRect(0, 0, S, S);
  // brass inlay: the printed geometry, with a subtle bright edge for the "set into the stone" read
  const lw = Math.max(3, px(CFG.edgeU * CFG.lineWidthFrac * 1.35));
  const strokeAll = (style, width, dy) => {
    a.strokeStyle = style; a.lineWidth = width; a.lineCap = 'round';
    for (const r of CFG.rings) { a.beginPath(); a.arc(ox, oy + (dy||0), px(r), 0, 7); a.stroke(); }
    for (const s of CFG.sideArcs) {
      a.beginPath();
      a.arc(ox + px(s.cx), oy + px(s.cy) + (dy||0), px(s.r), s.a0 * Math.PI/180, s.a1 * Math.PI/180);
      a.stroke();
    }
  };
  strokeAll('rgba(0,0,0,0.55)', lw * 1.9, lw*0.5);          // groove shadow under the inlay
  const brass = a.createLinearGradient(0, 0, S, S);
  brass.addColorStop(0, LOOK.slate.brass); brass.addColorStop(0.5, LOOK.slate.brassHi); brass.addColorStop(1, LOOK.slate.brass);
  strokeAll(brass, lw, 0);
  // start dots — brass studs at the six feet start positions
  const dotR = Math.max(3, px(CFG.edgeU * CFG.padRadiusFrac * 1.6));
  const dots = [];
  for (const [hx, rot] of [[-CFG.startX, 0], [CFG.startX, Math.PI]])
    for (let i = 0; i < 3; i++) {
      const th = rot + i * 2*Math.PI/3;
      dots.push([hx + Math.cos(th)*CFG.footR, Math.sin(th)*CFG.footR]);
    }
  for (const [dx, dyy] of dots) {
    a.fillStyle = 'rgba(0,0,0,0.5)';
    a.beginPath(); a.arc(ox + px(dx), oy + px(dyy) + dotR*0.35, dotR*1.25, 0, 7); a.fill();
    a.fillStyle = brass;
    a.beginPath(); a.arc(ox + px(dx), oy + px(dyy), dotR, 0, 7); a.fill();
  }
  // roughness: stone fairly rough with variation; the inlay polished (dark = smooth in this map)
  const rough = document.createElement('canvas'); rough.width = rough.height = S;
  const r = rough.getContext('2d');
  r.fillStyle = '#9a9a9a'; r.fillRect(0, 0, S, S);
  r.globalAlpha = 0.5; r.drawImage(noiseCanvas(S, 0.12), 0, 0); r.globalAlpha = 1;
  const strokeR = (style, width) => {
    r.strokeStyle = style; r.lineWidth = width; r.lineCap = 'round';
    for (const g of CFG.rings) { r.beginPath(); r.arc(ox, oy, px(g), 0, 7); r.stroke(); }
    for (const s of CFG.sideArcs) {
      r.beginPath(); r.arc(ox + px(s.cx), oy + px(s.cy), px(s.r), s.a0*Math.PI/180, s.a1*Math.PI/180); r.stroke();
    }
  };
  strokeR('#3a3a3a', lw);                                    // polished inlay
  for (const [dx, dyy] of dots) { r.fillStyle = '#3a3a3a'; r.beginPath(); r.arc(ox+px(dx), oy+px(dyy), dotR, 0, 7); r.fill(); }
  // bump: the stone noise + a dip along the groove
  const bump = document.createElement('canvas'); bump.width = bump.height = S;
  const b = bump.getContext('2d');
  b.fillStyle = '#808080'; b.fillRect(0, 0, S, S);
  b.globalAlpha = 0.6; b.drawImage(noiseCanvas(S, 0.10), 0, 0); b.globalAlpha = 1;
  const strokeB = () => {
    b.strokeStyle = '#5a5a5a'; b.lineWidth = lw * 1.6; b.lineCap = 'round';
    for (const g of CFG.rings) { b.beginPath(); b.arc(ox, oy, px(g), 0, 7); b.stroke(); }
    for (const s of CFG.sideArcs) { b.beginPath(); b.arc(ox+px(s.cx), oy+px(s.cy), px(s.r), s.a0*Math.PI/180, s.a1*Math.PI/180); b.stroke(); }
  };
  strokeB();
  const tex = cv => { const t = new THREE.CanvasTexture(cv); t.anisotropy = 8; t.colorSpace = THREE.SRGBColorSpace; return t; };
  const texL = cv => { const t = new THREE.CanvasTexture(cv); t.anisotropy = 8; return t; };   // linear (data) maps
  return { map: tex(albedo), roughnessMap: texL(rough), bumpMap: texL(bump) };
}

const maps = boardMaps();
const boardMat = new THREE.MeshStandardMaterial({
  map: maps.map, roughnessMap: maps.roughnessMap, roughness: 1.0,
  bumpMap: maps.bumpMap, bumpScale: 0.9, metalness: 0.04, envMapIntensity: 0.7,
});
const boardTop = new THREE.Mesh(new THREE.CircleGeometry(CFG.edgeU, 128), boardMat);
boardTop.rotation.x = -Math.PI/2; boardTop.receiveShadow = true;
scene.add(boardTop);
// slab side + polished metal band, slightly below the playing face
const slab = new THREE.Mesh(new THREE.CylinderGeometry(CFG.edgeU, CFG.edgeU, 3.2, 128, 1, true),
  new THREE.MeshStandardMaterial({ color: 0x17191d, roughness: 0.8, metalness: 0.05 }));
slab.position.y = -1.62; scene.add(slab);
const band = new THREE.Mesh(new THREE.CylinderGeometry(CFG.edgeU*1.045, CFG.edgeU*1.085, 5.4, 128),
  new THREE.MeshStandardMaterial({ color: LOOK.rim.color, roughness: LOOK.rim.roughness, metalness: LOOK.rim.metalness, envMapIntensity: 1.1 }));
band.position.y = -3.1; band.receiveShadow = true; scene.add(band);
// wide dark table so the board doesn't float in void
const table = new THREE.Mesh(new THREE.CircleGeometry(1200, 64),
  new THREE.MeshStandardMaterial({ color: 0x0d0f13, roughness: 0.95 }));
table.rotation.x = -Math.PI/2; table.position.y = -5.9; table.receiveShadow = true; scene.add(table);

// ---- glass tripods (same geometry as the game's buildTripod, premium material) ---------------
function taperedLeg(curve, mat, legRad, radialSegs, lenSegs, taperFrac) {
  const frames = curve.computeFrenetFrames(lenSegs, false);
  const positions = [], normals = [], indices = [];
  for (let i = 0; i <= lenSegs; i++) {
    const u = i/lenSegs, center = curve.getPointAt(u);
    const N = frames.normals[i], B = frames.binormals[i];
    let rad = legRad;
    if (u > 1 - taperFrac) {
      const t = (u - (1 - taperFrac)) / taperFrac, s = t*t*(3 - 2*t);
      rad = legRad * (1 - s) + CFG.footPadRadius * s;
    }
    for (let j = 0; j < radialSegs; j++) {
      const phi = j/radialSegs * Math.PI * 2, nx = Math.cos(phi), ny = Math.sin(phi);
      const n = new THREE.Vector3().addScaledVector(N, nx).addScaledVector(B, ny).normalize();
      positions.push(center.x + n.x*rad, center.y + n.y*rad, center.z + n.z*rad);
      normals.push(n.x, n.y, n.z);
    }
  }
  for (let i = 0; i < lenSegs; i++) for (let j = 0; j < radialSegs; j++) {
    const jn = (j+1) % radialSegs;
    const a2 = i*radialSegs + j, b2 = i*radialSegs + jn, c2 = (i+1)*radialSegs + j, d2 = (i+1)*radialSegs + jn;
    indices.push(a2, c2, b2, b2, c2, d2);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  g.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  g.setIndex(indices);
  const m = new THREE.Mesh(g, mat); m.castShadow = true;
  return m;
}
function glassMat(c, thickness, attDist, roughness, emiss) {
  return new THREE.MeshPhysicalMaterial({
    color: c.tint, metalness: 0, roughness,
    transmission: 1.0, ior: LOOK.glass.ior, thickness,
    attenuationColor: new THREE.Color(c.att), attenuationDistance: attDist,
    emissive: new THREE.Color(c.att), emissiveIntensity: emiss,   // internal glow so thin sections carry colour
    clearcoat: LOOK.glass.clearcoat, clearcoatRoughness: 0.06,
    specularIntensity: 0.9, envMapIntensity: 0.8,
  });
}
function buildTripod(c) {
  const g = new THREE.Group();
  // thin legs need a LONG assumed light path (thickness) + short attenuation distance to read as
  // coloured glass; the fat hub would crush to black with the same numbers, so it gets its own mix.
  const mat = glassMat(c, 11.0, 4.2, 0.14, 0.16);   // legs + feet: deep tint, lit from within
  const hubMat = glassMat(c, 5.0, 6.5, LOOK.glass.roughness, 0.06);
  const R = CFG.footR, H = CFG.hubHeight, legRad = CFG.legRadius;
  for (let i = 0; i < 3; i++) {
    const th = i * 2*Math.PI/3, pts = [];
    for (let k = 0; k <= 20; k++) {
      const ph = (k/20) * (Math.PI/2);
      pts.push(new THREE.Vector3(Math.sin(ph)*R*Math.cos(th), Math.cos(ph)*H, Math.sin(ph)*R*Math.sin(th)));
    }
    g.add(taperedLeg(new THREE.CatmullRomCurve3(pts), mat, legRad, 20, 36, 0.6));
    const foot = new THREE.Mesh(new THREE.SphereGeometry(legRad*0.45, 20, 14), mat);
    foot.scale.set(1, 0.55, 1); foot.position.set(Math.cos(th)*R, 0.4, Math.sin(th)*R);
    foot.castShadow = true; g.add(foot);
  }
  const hub = new THREE.Mesh(new THREE.SphereGeometry(legRad*1.9, 28, 20), hubMat);
  hub.position.set(0, H, 0); hub.castShadow = true; g.add(hub);
  return g;
}
const blue = buildTripod(LOOK.blue), red = buildTripod(LOOK.red);
blue.position.set(POSE[0], 0, POSE[1]); blue.rotation.y = -POSE[2];
red.position.set(POSE[3], 0, POSE[4]); red.rotation.y = -POSE[5];
scene.add(blue, red);

// ---- post ------------------------------------------------------------------------------------
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight),
  LOOK.bloom.strength, LOOK.bloom.radius, LOOK.bloom.threshold);
composer.addPass(bloom);
composer.addPass(new OutputPass());

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
});

let frames = 0;
function loop() {
  requestAnimationFrame(loop);
  controls.update();
  composer.render();
  if (++frames === 6) window.__spikeReady = true;   // headless screenshot hook
}
loop();
</script>
</body>
</html>

<script type="module">
// Premium render spike for the Steam build — SAME game geometry (CFG dims from index.html),
// four art directions, toggled in place from the bottom-right links (?theme= picks the opener):
//   noir  — glass pieces, brass-inlaid dark slate, moody (the original spike; costliest: transmission)
//   math  — graphite precision: quiet graticule, implied compass construction, ink-ceramic pieces (cheap)
//   sumo  — the ring at dusk: deep earth, broad burnished bands, urushi-lacquer pieces (cheap)
//   cosy  — fireside boardgame: honey wood, cream painted lines, toy-glaze pieces (cheap)
//   alien — living membrane board with bioluminescent channels, thin-film iridescent chitin pieces
// The pieces play the menu's ambient AI battle: the game-sim section below is a verbatim port of
// index.html's engine (Piece, crossing rule, 3D contact push, turn logic) plus the landing demo's
// wobbly heuristic driver, so the tripods genuinely push each other around and off the rim,
// tumble, and start a fresh game — keep it in sync with index.html if the rules ever change.
// ?fps shows a live framerate readout. Look experiment only: not linked from the game.
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ---- game dims (index.html CFG — keep in sync) ----------------------------------------------
const CFG = {
  edgeU: 66.667, rings: [40, 53.3],
  sideArcs: [ { cx:-66.667, cy:0, r:40, a0:-72.542, a1:72.542 },
              { cx: 66.667, cy:0, r:40, a0:107.458, a1:252.542 } ],
  lineWidthFrac: 0.0079, padRadiusFrac: 0.0082,
  footR: 23.095, hubHeight: 23.095, legRadius: 2.0, footPadFrac: 0.4, startX: 30.597,
  // sim params (same values as index.html — the rules engine below depends on them)
  edgeEps: 0.5, maxCrossingsPerTurn: 1,
  crossEps: 0.4, holdEps: 0.45, touchEps: 0.8, lineStick: 0.25, cornerEps: 1.1,
  substepDeg: 0.4, lockDeg: 2, legSegs: 12,
  inertiaK: 0.7, pushIters: 10, pushRelax: 1.0, maxPenPerIter: 0.8, minHorizFrac: 0.35,
};
CFG.footPadRadius = CFG.legRadius * CFG.footPadFrac;

let THEME = (new URLSearchParams(location.search).get('theme') || 'noir').toLowerCase();
const SHOW_FPS = new URLSearchParams(location.search).has('fps');

// ---- shared canvas helpers -------------------------------------------------------------------
const S = 2048, sc = S / (2 * CFG.edgeU), ox = S/2, oy = S/2, px = u => u * sc;
const LW = Math.max(3, px(CFG.edgeU * CFG.lineWidthFrac * 1.35));
const DOTS = [];
for (const [hx, rot] of [[-CFG.startX, 0], [CFG.startX, Math.PI]])
  for (let i = 0; i < 3; i++) {
    const th = rot + i * 2*Math.PI/3;
    DOTS.push([hx + Math.cos(th)*CFG.footR, Math.sin(th)*CFG.footR]);
  }
function canvas2d() { const cv = document.createElement('canvas'); cv.width = cv.height = S; return [cv, cv.getContext('2d')]; }
function strokeLines(c, style, width, dash) {          // the printed geometry: 2 rings + 2 lens arcs
  c.strokeStyle = style; c.lineWidth = width; c.lineCap = 'round';
  c.setLineDash(dash || []);
  for (const r of CFG.rings) { c.beginPath(); c.arc(ox, oy, px(r), 0, 7); c.stroke(); }
  for (const s of CFG.sideArcs) {
    c.beginPath(); c.arc(ox + px(s.cx), oy + px(s.cy), px(s.r), s.a0*Math.PI/180, s.a1*Math.PI/180); c.stroke();
  }
  c.setLineDash([]);
}
function noiseCanvas(amp, seed) {
  const [cv, c] = canvas2d();
  c.fillStyle = '#808080'; c.fillRect(0, 0, S, S);
  let rng = seed || 1234567;
  const rnd = () => (rng = (rng * 16807) % 2147483647) / 2147483647;
  for (let pass = 0; pass < 3; pass++) {
    const n = 42 * (pass + 1), r0 = S / (5 + pass * 6);
    for (let i = 0; i < n; i++) {
      const x = rnd()*S, y = rnd()*S, r = r0 * (0.5 + rnd()), v = rnd();
      const g = c.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0, `rgba(${v>0.5?255:0},${v>0.5?255:0},${v>0.5?255:0},${amp/(pass+1)})`);
      g.addColorStop(1, 'rgba(128,128,128,0)');
      c.fillStyle = g; c.beginPath(); c.arc(x, y, r, 0, 7); c.fill();
    }
  }
  const img = c.getImageData(0, 0, S, S), d = img.data;
  for (let i = 0; i < d.length; i += 4) { const g = (rnd()-0.5)*22; d[i]+=g; d[i+1]+=g; d[i+2]+=g; }
  c.putImageData(img, 0, 0);
  return cv;
}
function vignette(c, strength) {
  const vg = c.createRadialGradient(ox, oy, px(CFG.edgeU)*0.35, ox, oy, px(CFG.edgeU));
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, `rgba(0,0,0,${strength})`);
  c.fillStyle = vg; c.fillRect(0, 0, S, S);
}
const tex  = cv => { const t = new THREE.CanvasTexture(cv); t.anisotropy = 8; t.colorSpace = THREE.SRGBColorSpace; return t; };
const texL = cv => { const t = new THREE.CanvasTexture(cv); t.anisotropy = 8; return t; };

// ---- themes ----------------------------------------------------------------------------------
const THEMES = {

  // ============ NOIR — glass on brass-inlaid slate (the original spike) ============
  noir: {
    bg: 0x0a0c10, exposure: 1.05, bloom: [0.22, 0.5, 0.9],
    key: { color: 0xfff1dc, intensity: 2.6, pos: [70,130,45], shadow: 0.55 },
    fill:{ color: 0x8fb4ff, intensity: 0.5 },
    band: { color: 0x353a42, rough: 0.35, metal: 0.85 }, slabColor: 0x17191d, tableColor: 0x0d0f13,
    boardEnv: 0.7, bumpScale: 0.9,
    paint() {
      const [al, a] = canvas2d();
      a.fillStyle = '#23262c'; a.fillRect(0, 0, S, S);
      a.globalCompositeOperation = 'soft-light'; a.globalAlpha = 0.85;
      a.drawImage(noiseCanvas(0.12), 0, 0);
      a.globalCompositeOperation = 'source-over'; a.globalAlpha = 1;
      vignette(a, 0.34);
      strokeLines(a, 'rgba(0,0,0,0.55)', LW*1.9);
      const brass = a.createLinearGradient(0, 0, S, S);
      brass.addColorStop(0,'#a8843c'); brass.addColorStop(0.5,'#d6b567'); brass.addColorStop(1,'#a8843c');
      strokeLines(a, brass, LW);
      const dotR = Math.max(3, px(CFG.edgeU * CFG.padRadiusFrac * 1.6));
      for (const [dx,dy] of DOTS) {
        a.fillStyle='rgba(0,0,0,0.5)'; a.beginPath(); a.arc(ox+px(dx), oy+px(dy)+dotR*0.35, dotR*1.25, 0, 7); a.fill();
        a.fillStyle=brass; a.beginPath(); a.arc(ox+px(dx), oy+px(dy), dotR, 0, 7); a.fill();
      }
      const [ro, r] = canvas2d();
      r.fillStyle='#9a9a9a'; r.fillRect(0,0,S,S);
      r.globalAlpha=0.5; r.drawImage(noiseCanvas(0.12, 777), 0, 0); r.globalAlpha=1;
      strokeLines(r, '#3a3a3a', LW);
      for (const [dx,dy] of DOTS) { r.fillStyle='#3a3a3a'; r.beginPath(); r.arc(ox+px(dx), oy+px(dy), dotR, 0, 7); r.fill(); }
      const [bu, b] = canvas2d();
      b.fillStyle='#808080'; b.fillRect(0,0,S,S);
      b.globalAlpha=0.6; b.drawImage(noiseCanvas(0.10, 999), 0, 0); b.globalAlpha=1;
      strokeLines(b, '#5a5a5a', LW*1.6);
      return { albedo: al, rough: ro, bump: bu };
    },
    pieces(which) {   // glass — transmission (the expensive material; this theme is the GPU test)
      const c = which === 'blue' ? { tint:0x7aa4ee, att:0x3b74e8 } : { tint:0xee7a6f, att:0xe8483b };
      const mk = o => new THREE.MeshPhysicalMaterial(Object.assign({
        color: c.tint, metalness: 0, transmission: 1.0, ior: 1.5,
        attenuationColor: new THREE.Color(c.att), emissive: new THREE.Color(c.att),
      }, o));
      return {
        // legs at grazing angles are all Fresnel: with full clearcoat/env they washed to colourless
        // chrome (phone photo) — so the legs run the attenuation much harder and the reflective
        // terms much softer, and you see INTO the glass the way you do on the face-on bead.
        leg: mk({ thickness: 11.0, attenuationDistance: 2.4, roughness: 0.12, emissiveIntensity: 0.24,
                  clearcoat: 0.45, clearcoatRoughness: 0.14, specularIntensity: 0.4, envMapIntensity: 0.3 }),
        // the bead — untouched, it reads as real glass
        hub: mk({ thickness: 5.0, attenuationDistance: 6.5, roughness: 0.12, emissiveIntensity: 0.06,
                  clearcoat: 1.0, clearcoatRoughness: 0.06, specularIntensity: 0.9, envMapIntensity: 0.8 }),
      };
    },
  },

  // ============ MATH — graphite precision: the geometry speaks for itself, nothing is written ============
  math: {
    bg: 0x0d1017, exposure: 1.0, bloom: [0.16, 0.45, 0.88],
    key: { color: 0xffffff, intensity: 2.2, pos: [40,140,70], shadow: 0.5 },
    fill:{ color: 0xa8c8ff, intensity: 0.65 },
    band: { color: 0x20242c, rough: 0.5, metal: 0.6 }, slabColor: 0x14171d, tableColor: 0x0b0d12,
    boardEnv: 0.3, bumpScale: 0.35,
    paint() {
      const [al, a] = canvas2d();
      a.fillStyle = '#141b28'; a.fillRect(0, 0, S, S);          // ink-navy graphite
      a.globalAlpha = 0.25; a.drawImage(noiseCanvas(0.07), 0, 0); a.globalAlpha = 1;
      // a whisper of a polar graticule — fine circles, a few spokes; no numbers, no ruler
      a.strokeStyle = 'rgba(180,205,235,0.05)'; a.lineWidth = 2;
      for (let r = 10; r < CFG.edgeU; r += 10) { a.beginPath(); a.arc(ox, oy, px(r), 0, 7); a.stroke(); }
      for (let d = 0; d < 360; d += 30) {
        const t = d*Math.PI/180;
        a.beginPath(); a.moveTo(ox, oy); a.lineTo(ox + Math.cos(t)*px(CFG.edgeU), oy + Math.sin(t)*px(CFG.edgeU)); a.stroke();
      }
      // the compass construction, implied: the side arcs completed as faint dashed circles
      a.strokeStyle = 'rgba(150,200,255,0.13)'; a.lineWidth = 2.5; a.setLineDash([14, 12]);
      for (const s of CFG.sideArcs) { a.beginPath(); a.arc(ox + px(s.cx), oy + px(s.cy), px(s.r), 0, 7); a.stroke(); }
      a.setLineDash([]);
      vignette(a, 0.2);
      // the printed geometry — crisp pale hairlines
      strokeLines(a, 'rgba(228,240,252,0.92)', LW*0.75);
      // start dots as marked points: open circle + centre dot
      const dotR = Math.max(4, px(CFG.edgeU * CFG.padRadiusFrac * 1.9));
      for (const [dx,dy] of DOTS) {
        a.strokeStyle = 'rgba(228,240,252,0.9)'; a.lineWidth = 3;
        a.beginPath(); a.arc(ox+px(dx), oy+px(dy), dotR, 0, 7); a.stroke();
        a.fillStyle = 'rgba(228,240,252,0.9)';
        a.beginPath(); a.arc(ox+px(dx), oy+px(dy), dotR*0.3, 0, 7); a.fill();
      }
      const [ro, r] = canvas2d();
      r.fillStyle = '#8a8a8a'; r.fillRect(0, 0, S, S);          // matte board
      strokeLines(r, '#5a5a5a', LW*0.75);                        // ink slightly glossier
      const [bu, b] = canvas2d(); b.fillStyle = '#808080'; b.fillRect(0, 0, S, S);   // near-flat
      return { albedo: al, rough: ro, bump: bu };
    },
    pieces(which) {   // glazed ink ceramic — cheap, phone-friendly
      const col = which === 'blue' ? 0x2f6fd8 : 0xd8442f;
      // hubs face the camera so gloss reads as glaze; legs sit at grazing angles where
      // Fresnel would silver them — they get a duller, lower-spec variant of the same glaze
      const hub = new THREE.MeshPhysicalMaterial({ color: col, metalness: 0, roughness: 0.45,
        clearcoat: 0.35, clearcoatRoughness: 0.3, envMapIntensity: 0.45 });
      const leg = new THREE.MeshPhysicalMaterial({ color: col, metalness: 0, roughness: 0.52,
        clearcoat: 0.15, clearcoatRoughness: 0.4, envMapIntensity: 0.25, specularIntensity: 0.45 });
      return { leg, hub };
    },
  },

  // ============ SUMO — the ring at dusk: weight and ceremony, no props ============
  sumo: {
    bg: 0x17120d, exposure: 1.02, bloom: [0.15, 0.55, 0.92],
    key: { color: 0xffdfae, intensity: 2.4, pos: [95,85,30], shadow: 0.65 },
    fill:{ color: 0x7286a8, intensity: 0.35 },
    band: { color: 0x3a2b1c, rough: 0.7, metal: 0.05 }, slabColor: 0x46351f, tableColor: 0x201810,
    boardEnv: 0.4, bumpScale: 0.9,
    paint() {
      const [al, a] = canvas2d();
      a.fillStyle = '#6e4a2c'; a.fillRect(0, 0, S, S);          // deep earth
      a.globalCompositeOperation = 'soft-light'; a.globalAlpha = 1;
      a.drawImage(noiseCanvas(0.14), 0, 0);
      a.globalCompositeOperation = 'source-over';
      // faint worn patches — the ring has been fought on
      let rng = 424242; const rnd = () => (rng = (rng*16807)%2147483647)/2147483647;
      for (let i = 0; i < 40; i++) {
        const x = rnd()*S, y = rnd()*S, r = 40 + rnd()*140;
        const g = a.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, `rgba(46,30,16,${0.04 + rnd()*0.05})`); g.addColorStop(1, 'rgba(46,30,16,0)');
        a.fillStyle = g; a.beginPath(); a.arc(x, y, r, 0, 7); a.fill();
      }
      vignette(a, 0.42);
      // the lines as broad, calm bands of burnished sand — weight, not rope
      strokeLines(a, 'rgba(28,16,6,0.55)', LW*2.6);
      strokeLines(a, '#c89a54', LW*1.8);
      strokeLines(a, 'rgba(240,206,138,0.5)', LW*0.7);
      // start dots: plain warm marks
      const dotR = Math.max(5, px(CFG.edgeU * CFG.padRadiusFrac * 2.0));
      for (const [dx,dy] of DOTS) {
        a.fillStyle = 'rgba(28,16,6,0.45)'; a.beginPath(); a.arc(ox+px(dx), oy+px(dy)+dotR*0.3, dotR*1.25, 0, 7); a.fill();
        a.fillStyle = '#d9ae62'; a.beginPath(); a.arc(ox+px(dx), oy+px(dy), dotR, 0, 7); a.fill();
      }
      const [ro, r] = canvas2d();
      r.fillStyle = '#b0b0b0'; r.fillRect(0, 0, S, S);           // dry earth = rough
      r.globalAlpha = 0.4; r.drawImage(noiseCanvas(0.12, 555), 0, 0); r.globalAlpha = 1;
      strokeLines(r, '#7a7a7a', LW*1.8);                          // burnished bands sit glossier
      const [bu, b] = canvas2d();
      b.fillStyle = '#808080'; b.fillRect(0, 0, S, S);
      b.globalAlpha = 0.6; b.drawImage(noiseCanvas(0.12, 313), 0, 0); b.globalAlpha = 1;
      strokeLines(b, '#b4b4b4', LW*1.8);                          // bands gently raised
      return { albedo: al, rough: ro, bump: bu };
    },
    pieces(which) {   // urushi lacquer — deep indigo / vermillion, gold-warm sheen
      // deep lacquer only works face-on (the hubs); on thin grazing legs the dark diffuse
      // vanishes under Fresnel and they chrome out — legs use a lighter coat, less spec
      const hubCol = which === 'blue' ? 0x1d2854 : 0x8c1c12;
      const legCol = which === 'blue' ? 0x31488f : 0xb03220;
      const hub = new THREE.MeshPhysicalMaterial({ color: hubCol, metalness: 0, roughness: 0.3,
        clearcoat: 0.55, clearcoatRoughness: 0.18, envMapIntensity: 0.5 });
      const leg = new THREE.MeshPhysicalMaterial({ color: legCol, metalness: 0, roughness: 0.42,
        clearcoat: 0.22, clearcoatRoughness: 0.32, envMapIntensity: 0.2, specularIntensity: 0.5 });
      return { leg, hub };
    },
  },

  // ============ COSY — fireside boardgame: honey wood + cream paint ============
  cosy: {
    bg: 0x241a12, exposure: 1.06, bloom: [0.17, 0.6, 0.88],
    key: { color: 0xffc98a, intensity: 2.7, pos: [95,75,25], shadow: 0.6 },
    fill:{ color: 0x86a0c8, intensity: 0.3 },
    band: { color: 0x503722, rough: 0.55, metal: 0.05 }, slabColor: 0x453019, tableColor: 0x33241a,
    boardEnv: 0.8, bumpScale: 0.6,
    paint() {
      const [al, a] = canvas2d();
      a.fillStyle = '#8a6136'; a.fillRect(0, 0, S, S);           // honey oak
      // grain: long wavy horizontal streaks
      let rng = 9090909; const rnd = () => (rng = (rng*16807)%2147483647)/2147483647;
      for (let i = 0; i < 210; i++) {
        const y0 = rnd()*S, amp = 4 + rnd()*10, w = 2 + rnd()*7;
        a.strokeStyle = rnd() > 0.5 ? `rgba(110,74,38,${0.10+rnd()*0.12})` : `rgba(161,121,63,${0.10+rnd()*0.10})`;
        a.lineWidth = w; a.beginPath();
        for (let x = 0; x <= S; x += 64) a.lineTo(x, y0 + Math.sin(x*0.004 + rnd()*6)*amp);
        a.stroke();
      }
      a.globalCompositeOperation = 'soft-light'; a.globalAlpha = 0.5;
      a.drawImage(noiseCanvas(0.08, 202), 0, 0);
      a.globalCompositeOperation = 'source-over'; a.globalAlpha = 1;
      vignette(a, 0.26);
      // cream painted lines, slightly soft-edged
      strokeLines(a, 'rgba(60,40,20,0.35)', LW*1.8);
      strokeLines(a, '#efe3c6', LW*1.25);
      const dotR = Math.max(4, px(CFG.edgeU * CFG.padRadiusFrac * 1.9));
      for (const [dx,dy] of DOTS) {
        a.fillStyle = 'rgba(60,40,20,0.3)'; a.beginPath(); a.arc(ox+px(dx), oy+px(dy)+dotR*0.3, dotR*1.2, 0, 7); a.fill();
        a.fillStyle = '#efe3c6'; a.beginPath(); a.arc(ox+px(dx), oy+px(dy), dotR, 0, 7); a.fill();
      }
      const [ro, r] = canvas2d();
      r.fillStyle = '#6e6e6e'; r.fillRect(0, 0, S, S);           // varnished wood, medium gloss
      r.globalAlpha = 0.35; r.drawImage(noiseCanvas(0.10, 404), 0, 0); r.globalAlpha = 1;
      strokeLines(r, '#9a9a9a', LW*1.25);                         // paint sits matter than varnish
      const [bu, b] = canvas2d();
      b.fillStyle = '#808080'; b.fillRect(0, 0, S, S);
      b.globalAlpha = 0.4; b.drawImage(noiseCanvas(0.08, 505), 0, 0); b.globalAlpha = 1;
      return { albedo: al, rough: ro, bump: bu };
    },
    pieces(which) {   // friendly toy-glaze painted pieces
      const col = which === 'blue' ? 0x3f6fc4 : 0xcf5030;
      const hub = new THREE.MeshPhysicalMaterial({ color: col, metalness: 0, roughness: 0.48,
        clearcoat: 0.3, clearcoatRoughness: 0.3, envMapIntensity: 0.4 });
      const leg = new THREE.MeshPhysicalMaterial({ color: col, metalness: 0, roughness: 0.52,
        clearcoat: 0.18, clearcoatRoughness: 0.38, envMapIntensity: 0.28, specularIntensity: 0.55 });
      return { leg, hub };
    },
  },

  // ============ ALIEN — foreign biology: the board is alive, the light is wrong ============
  // No little-green-men skin. The board is a subdermal membrane with a branching vein network,
  // and the printed geometry is BIOLUMINESCENT — the game lines are channels the organism lights
  // from inside (emissive map + bloom). The pieces are thin-film iridescent chitin: reflection
  // colour genuinely shifts with viewing angle (physical thin-film interference, the "weird
  // refractive index" of beetle shells and oil slicks) — strongest exactly at the grazing angles
  // that silver ordinary materials. Lighting is deliberately unnatural: a dim violet key from
  // the wrong side, an acid-teal counter light, and murk instead of air.
  alien: {
    bg: 0x04060b, exposure: 1.05, bloom: [0.45, 0.7, 0.72],
    key: { color: 0x9d8ce8, intensity: 1.0, pos: [-70,110,-50], shadow: 0.35 },
    fill:{ color: 0x35e8c8, intensity: 0.55 },
    band: { color: 0x191324, rough: 0.35, metal: 0.25 }, slabColor: 0x110d1a, tableColor: 0x06060c,
    boardEnv: 0.25, bumpScale: 1.1, emissiveIntensity: 1.5,
    fog: { color: 0x0a0816, density: 0.0018 },
    paint() {
      // one vein network, drawn into albedo (dark), bump (raised) — precompute the segments
      let rng = 777001; const rnd = () => (rng = (rng*16807)%2147483647)/2147483647;
      const segs = [], stack = [];
      for (let i = 0; i < 24; i++)
        stack.push({ x: rnd()*S, y: rnd()*S, h: rnd()*Math.PI*2, w: 4 + rnd()*5, life: 50 + rnd()*90 });
      while (stack.length) {
        const v = stack.pop();
        while (v.life-- > 0 && v.w > 0.8) {
          const x0 = v.x, y0 = v.y;
          v.h += (rnd() - 0.5)*0.55;
          v.x += Math.cos(v.h)*9; v.y += Math.sin(v.h)*9;
          v.w *= 0.985;
          segs.push([x0, y0, v.x, v.y, v.w]);
          if (rnd() < 0.05 && stack.length < 100)
            stack.push({ x: v.x, y: v.y, h: v.h + (rnd() < 0.5 ? 0.9 : -0.9), w: v.w*0.7, life: v.life*0.7 });
        }
      }
      const drawVeins = (c, style, wMul) => {
        c.strokeStyle = style; c.lineCap = 'round';
        for (const [x0, y0, x1, y1, w] of segs) {
          c.lineWidth = Math.max(0.6, w*wMul);

function taperedLeg(curve, mat, legRad, radialSegs, lenSegs, taperFrac) {

}
function resolvePush(active, opp) {
  const minD = CFG.legRadius*2, hubR = CFG.legRadius*1.9, H = CFG.hubHeight;
  const m = 1, I = CFG.inertiaK * CFG.footR * CFG.footR;
  const opp0 = { x: opp.x, y: opp.y };
  const aArcs = active.legArcs(), aChords = active.legs();
  const aHub = { x: active.x, y: active.y, h: H };
  const apply = (px2, py2, nx, ny, sep) => {
    sep = Math.min(sep, CFG.maxPenPerIter);
    const rx = px2 - opp.x, ry = py2 - opp.y;
    const rn = rx*ny - ry*nx;
    const wEff = 1/m + rn*rn/I;
    const lambda = CFG.pushRelax * sep / wEff;
    opp.x   += (lambda/m)*nx;
    opp.y   += (lambda/m)*ny;
    opp.rot += (lambda*rn)/I;
  };
  const push3d = (pa, pb, dist, gap) => {
    const nx3 = (pb.x - pa.x)/dist, ny3 = (pb.y - pa.y)/dist;
    const hf = Math.hypot(nx3, ny3);
    if (hf < 1e-4) return;
    apply(pb.x, pb.y, nx3/hf, ny3/hf, gap/Math.max(hf, CFG.minHorizFrac));
  };
  for (let iter = 0; iter < CFG.pushIters; iter++) {
    const oArcs = opp.legArcs(), oChords = opp.legs();
    const oHub = { x: opp.x, y: opp.y, h: H };
    let any = false;
    for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) {
      if (segClosest(aChords[i][0], aChords[i][1], oChords[j][0], oChords[j][1]).dist >= minD) continue;
      const c = arcClosest(aArcs[i], oArcs[j]);
      if (c.dist >= minD) continue;
      any = true;
      if (c.dist < 0.3) {
        const A = aChords[i], ax = A[1].x - A[0].x, ay = A[1].y - A[0].y, L = Math.hypot(ax, ay) || 1;
        let nx = -ay/L, ny = ax/L;
        if (nx*(opp0.x - c.pa.x) + ny*(opp0.y - c.pa.y) < 0) { nx = -nx; ny = -ny; }
        apply(c.pb.x, c.pb.y, nx, ny, minD);
      } else {
        push3d(c.pa, c.pb, c.dist, minD - c.dist);
      }
    }
    const hubLegD = hubR + CFG.legRadius;
    for (let j = 0; j < 3; j++) {
      const c = pointArcClosest(aHub, oArcs[j]);
      if (c.dist < hubLegD && c.dist > 1e-6) { any = true; push3d(aHub, c.pt, c.dist, hubLegD - c.dist); }
    }
    for (let i = 0; i < 3; i++) {
      const c = pointArcClosest(oHub, aArcs[i]);
      if (c.dist < hubLegD && c.dist > 1e-6) { any = true; push3d(c.pt, oHub, c.dist, hubLegD - c.dist); }
    }
    {
      const dx = opp.x - active.x, dy = opp.y - active.y, d = Math.hypot(dx, dy);
      if (d < 2*hubR && d > 1e-6) { any = true; apply(opp.x, opp.y, dx/d, dy/d, 2*hubR - d); }
    }
    if (!any) break;
  }
}

// turn logic
let G;
function reset() {
  const bluep = new Piece(0), redp = new Piece(1);
  bluep.x = -CFG.startX; bluep.rot = 0;
  redp.x  =  CFG.startX; redp.rot  = Math.PI;
  G = { pieces: [bluep, redp], active: 0, pinned: null, pivot: null, turnDir: 0,
        crossings: 0, atLimit: false, netRad: 0, over: false, winner: null,
        snap: null, contact: null };
}
function takeSnap() { return G.pieces.map(p => ({ x: p.x, y: p.y, rot: p.rot })); }
function pinFoot(idx) {
  const feet = G.pieces[G.active].feet();
  G.pinned = idx; G.pivot = { x: feet[idx].x, y: feet[idx].y };
  G.turnDir = 0; G.crossings = 0; G.atLimit = false; G.netRad = 0;
  G.snap = takeSnap();
  G.contact = null;
}
function applySwing(dA) {
  if (dA === 0 || !G.pivot) return;
  if (G.turnDir !== 0 && Math.sign(dA) !== G.turnDir) return;
  const active = G.pieces[G.active], opp = G.pieces[1 - G.active];
  const stepMax = CFG.substepDeg*Math.PI/180;
  const steps = Math.max(1, Math.ceil(Math.abs(dA)/stepMax));
  const step = dA/steps;
  for (let s = 0; s < steps; s++) {
    const before = active.feet();
    active.rotateAround(G.pivot.x, G.pivot.y, step);
    if (active.anyFootOff()) {
      active.rotateAround(G.pivot.x, G.pivot.y, -step); G.atLimit = true; break; }
    if (crossingSubstep(before, active.feet(), G)) {
      active.rotateAround(G.pivot.x, G.pivot.y, -step); G.atLimit = true; break; }
    G.netRad += step;
    resolvePush(active, opp);
  }
  if (G.turnDir === 0 && Math.abs(G.netRad) >= CFG.lockDeg*Math.PI/180)
    G.turnDir = Math.sign(G.netRad);
}
function clearTurn() { G.pinned = null; G.pivot = null; G.turnDir = 0;
  G.crossings = 0; G.atLimit = false; G.netRad = 0; G.snap = null; G.contact = null; }
function endTurn() {
  const active = G.pieces[G.active], opp = G.pieces[1 - G.active];
  if (active.anyFootOff()) { G.over = true; G.winner = 1 - G.active; }
  else if (opp.anyFootOff()) { G.over = true; G.winner = G.active; }
  else G.active = 1 - G.active;
  clearTurn();
}

// the landing demo's wobbly heuristic brain (index.html's aiChoosePlan + demoComputePlan;
// the searched zone/hard/master brains stay in the game — the spike just needs a lively tussle)
const AI_SAFETY_CAP_RAD = 170*Math.PI/180;
const DEMO_STEP_RAD = 3*Math.PI/180;
function directionToward(pivot, footPos, targetPos) {
  const aFoot = Math.atan2(footPos.y - pivot.y, footPos.x - pivot.x);
  const aTarget = Math.atan2(targetPos.y - pivot.y, targetPos.x - pivot.x);
  return norm(aTarget - aFoot) >= 0 ? 1 : -1;
}
function aiChoosePlan(aiIdx) {
  const ai = G.pieces[aiIdx], other = G.pieces[1 - aiIdx];
  const offense = radU(ai) < radU(other);
  const ref = offense ? { x: other.x, y: other.y } : { x: 0, y: 0 };
  const feet = ai.feet();
  const order = [0, 1, 2].sort((p, q) =>
    radU({ x: feet[q].x - ref.x, y: feet[q].y - ref.y }) - radU({ x: feet[p].x - ref.x, y: feet[p].y - ref.y }));
  return { pivotIdx: order[1], swingIdx: order[0], target: ref };
}
// Decide the whole turn before any visible motion: run the swing to its natural limit on the
// live G, record the angle, roll everything back; the animation then only ever moves forward.
// Falls back to random pivots if the heuristic's choice is wedged, so the loop can't stall.
function tryPivot(pivotIdx, dir0) {
  pinFoot(pivotIdx);
  const snap = takeSnap();
  const lookahead = d => {
    let total = 0;
    while (Math.abs(total) < AI_SAFETY_CAP_RAD) { applySwing(d*DEMO_STEP_RAD); total = G.netRad; if (G.atLimit) break; }
    return G.netRad;
  };
  const rollback = () => {
    G.pieces.forEach((p, i) => { p.x = snap[i].x; p.y = snap[i].y; p.rot = snap[i].rot; });
    G.turnDir = 0; G.crossings = 0; G.atLimit = false; G.netRad = 0; G.contact = null;
  };
  let dir = dir0, fullRad = lookahead(dir);
  if (Math.abs(fullRad) < 1e-9) { rollback(); dir = -dir; fullRad = lookahead(dir); }
  rollback();
  if (Math.abs(fullRad) < 1e-9) return null;
  return { dir, fullRad };
}
function demoPlan() {
  const plan = aiChoosePlan(G.active);
  const feetNow = G.pieces[G.active].feet();
  const dir0 = directionToward(feetNow[plan.pivotIdx], feetNow[plan.swingIdx], plan.target);
  let sw = tryPivot(plan.pivotIdx, dir0);
  if (!sw) for (const p of [0, 1, 2].sort(() => Math.random() - 0.5)) {
    if (p === plan.pivotIdx) continue;
    sw = tryPivot(p, Math.random() < 0.5 ? 1 : -1);
    if (sw) break;
  }
  if (!sw) return null;
  const keepFrac = Math.random() < 0.5 ? 1 : (0.6 + Math.random()*0.3);   // 'easy' / 'dumb' roll
  return { dir: sw.dir, targetRad: sw.fullRad*keepFrac };
}

// the loser's tip-over-the-rim tumble (index.html's triggerFall/stepFall, on the tripod group)
let fall = { active: false };
const fallTipAxis = new THREE.Vector3();
const FALL_AXIS_X = new THREE.Vector3(1,0,0), FALL_AXIS_Y = new THREE.Vector3(0,1,0), FALL_AXIS_Z = new THREE.Vector3(0,0,1);
const fallQ = new THREE.Quaternion(), fallP = new THREE.Vector3(), fallAxisV = new THREE.Vector3(), fallLever = new THREE.Vector3();
const FALL_FEET_LOCAL = [0,1,2].map(i => new THREE.Vector3(Math.cos(i*2*Math.PI/3)*CFG.footR, 0, Math.sin(i*2*Math.PI/3)*CFG.footR));
const fallFootW = new THREE.Vector3();
function triggerFall() {
  const li = 1 - G.winner, p = G.pieces[li];
  let fx = 0, fz = 0, fr = -1;
  for (const f of p.feet()) { const r = Math.hypot(f.x, f.y); if (r > fr) { fr = r; fx = f.x; fz = f.y; } }
  const d = Math.hypot(fx, fz) || 1;
  fall = { active: true, idx: li, phase: 'slide', vx: fx/d*50, vz: fz/d*50, vy: 0, tipRate: 0,
           px: 0, pz: 0, ax: 0, az: 0, theta: 0, omega: 0,
           wx: (Math.random()-0.5)*7, wy: (Math.random()-0.5)*3, wz: (Math.random()-0.5)*7 };
}
function fallLetGo(t) {
  fallAxisV.set(fall.ax, 0, fall.az);
  fallLever.set(t.position.x - fall.px, t.position.y, t.position.z - fall.pz);
  fallLever.cross(fallAxisV).multiplyScalar(-fall.omega);
  fall.vx += fallLever.x; fall.vy = fallLever.y; fall.vz += fallLever.z;
  const ol = Math.hypot(fall.px, fall.pz) || 1;
  const ux = fall.px/ol, uz = fall.pz/ol;
  const radial = fall.vx*ux + fall.vz*uz;
  if (radial < 0) { fall.vx -= radial*ux; fall.vz -= radial*uz; }
  fall.tipRate = fall.omega;
  fall.phase = 'free';
}
function applyFallRotation(t, f, dt, clear) {
  fallTipAxis.set(f.ax, 0, f.az);
  t.rotateOnWorldAxis(fallTipAxis, f.tipRate*dt);
  if (clear > 0) {
    t.rotateOnWorldAxis(FALL_AXIS_X, f.wx*dt*clear);
    t.rotateOnWorldAxis(FALL_AXIS_Y, f.wy*dt*clear);
    t.rotateOnWorldAxis(FALL_AXIS_Z, f.wz*dt*clear);
  }
}
function stepFall(dt) {
  const t = tripodGroups[fall.idx];
  if (fall.phase === 'slide') {
    t.position.x += fall.vx*dt; t.position.z += fall.vz*dt;
    const r = Math.hypot(t.position.x, t.position.z);
    if (r >= CFG.edgeU) {
      const ux = t.position.x/r, uz = t.position.z/r;
      fall.px = ux*CFG.edgeU; fall.pz = uz*CFG.edgeU;
      fall.ax = uz; fall.az = -ux;
      fall.theta = 0; fall.omega = 0.3;
      fall.phase = 'pivot';
    }
  } else if (fall.phase === 'pivot') {
    fall.omega += (5 + 9*fall.theta)*dt;
    const dth = fall.omega*dt;
    fall.theta += dth;
    fallAxisV.set(fall.ax, 0, fall.az);
    fallQ.setFromAxisAngle(fallAxisV, dth);
    fallP.set(fall.px, 0, fall.pz);
    t.position.sub(fallP).applyQuaternion(fallQ).add(fallP);
    t.quaternion.premultiply(fallQ);
    fall.vx *= Math.max(0, 1 - 2.5*dt); fall.vz *= Math.max(0, 1 - 2.5*dt);
    t.position.x += fall.vx*dt; t.position.z += fall.vz*dt;
    if (fall.theta > 1.9) fallLetGo(t);
  } else {
    fall.vy -= 260*dt;
    t.position.x += fall.vx*dt; t.position.y += fall.vy*dt; t.position.z += fall.vz*dt;
    const r = Math.hypot(t.position.x, t.position.z);
    applyFallRotation(t, fall, dt, Math.max(0, Math.min(1, (r - CFG.edgeU)/25)));
    if (t.position.y < -170) t.visible = false;
  }
  if (fall.phase !== 'free') {
    t.updateMatrixWorld();
    let minY = 0;
    for (let i = 0; i < 3; i++) {
      fallFootW.copy(FALL_FEET_LOCAL[i]).applyMatrix4(t.matrixWorld);
      if (Math.hypot(fallFootW.x, fallFootW.z) < CFG.edgeU && fallFootW.y < minY) minY = fallFootW.y;
    }
    if (fall.phase === 'slide') { if (minY < 0) t.position.y -= minY; }
    else if (minY < -0.6) fallLetGo(t);
  }
}

// driver: think → swing → (fall →) think, paced like the menu demo (3°/35ms ≈ 1.5 rad/s)
const SWING_RATE = 1.5;
const sim = { state: 'think', t: 0, wait: 1.1, plan: null, games: 0 };
function simTick(dt) {
  if (sim.state === 'think') {
    sim.t += dt;
    if (sim.t < sim.wait) return;
    const plan = demoPlan();
    if (!plan) { clearTurn(); sim.t = 0; sim.wait = 0.5; return; }
    sim.plan = plan; sim.state = 'swing';
  } else if (sim.state === 'swing') {
    if (!G.atLimit && Math.abs(G.netRad) < Math.abs(sim.plan.targetRad)) {
      const rem = Math.abs(sim.plan.targetRad) - Math.abs(G.netRad);
      applySwing(sim.plan.dir*Math.min(SWING_RATE*dt, rem));
    } else {
      sim.plan = null; endTurn();
      if (G.over) { triggerFall(); sim.state = 'fall'; sim.t = 0; }
      else { sim.state = 'think'; sim.t = 0; sim.wait = 0.5 + Math.random()*0.45; }
    }
  } else if (sim.state === 'fall') {
    if (fall.active) stepFall(dt);
    sim.t += dt;
    if (sim.t > 3.4) {
      tripodGroups[fall.idx].visible = true;
      fall = { active: false };
      sim.games++;
      reset();
      sim.state = 'think'; sim.t = 0; sim.wait = 1.2;
    }
  }
}
function syncPieces() {
  for (let i = 0; i < 2; i++) {
    if (fall.active && fall.idx === i) continue;
    const p = G.pieces[i], g = tripodGroups[i];
    g.position.set(p.x, 0, p.y);
    g.rotation.set(0, -p.rot, 0);
  }
}
reset(); syncPieces();
window.__simInfo = () => ({ state: sim.state, games: sim.games, over: G.over, fall: fall.active,
  pieces: G.pieces.map(p => ({ x: +p.x.toFixed(2), y: +p.y.toFixed(2), rot: +p.rot.toFixed(2) })) });
window.__simTick = simTick;   // headless tests fast-forward the battle without waiting real-time

// ---- post ------------------------------------------------------------------------------------
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.2, 0.5, 0.9);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

// ---- apply a theme in place: repaint the board, reskin the pieces, relight -------------------
function applyTheme(name) {
  if (!THEMES[name]) name = 'noir';
  THEME = name; T = THEMES[name];
  renderer.toneMappingExposure = T.exposure;
  scene.background.set(T.bg);
  key.color.set(T.key.color); key.intensity = T.key.intensity; key.position.set(...T.key.pos);
  key.shadow.intensity = T.key.shadow;
  fill.color.set(T.fill.color); fill.intensity = T.fill.intensity;
  const maps = T.paint();
  for (const k of ['map', 'roughnessMap', 'bumpMap', 'emissiveMap']) if (boardMat[k]) boardMat[k].dispose();
  boardMat.map = tex(maps.albedo); boardMat.roughnessMap = texL(maps.rough); boardMat.bumpMap = texL(maps.bump);
  if (maps.emissive) {   // a board that makes its own light (alien's bioluminescent channels)
    boardMat.emissiveMap = tex(maps.emissive); boardMat.emissive.set(0xffffff);
    boardMat.emissiveIntensity = T.emissiveIntensity || 1;
  } else { boardMat.emissiveMap = null; boardMat.emissive.set(0x000000); boardMat.emissiveIntensity = 1; }
  boardMat.bumpScale = T.bumpScale; boardMat.envMapIntensity = T.boardEnv; boardMat.needsUpdate = true;
  scene.fog = T.fog ? new THREE.FogExp2(T.fog.color, T.fog.density) : null;
  slabMat.color.set(T.slabColor);
  bandMat.color.set(T.band.color); bandMat.roughness = T.band.rough; bandMat.metalness = T.band.metal;
  tableMat.color.set(T.tableColor);
  tripodGroups.forEach((g, gi) => {
    const mats = T.pieces(gi === 0 ? 'blue' : 'red');
    g.traverse(o => { if (o.isMesh && o.userData.part) { o.material.dispose(); o.material = mats[o.userData.part]; } });
  });
  bloomPass.strength = T.bloom[0]; bloomPass.radius = T.bloom[1]; bloomPass.threshold = T.bloom[2];
  document.querySelectorAll('#themes a').forEach(a => a.className = a.dataset.theme === name ? 'cur' : '');
  history.replaceState(null, '', '?theme=' + name + (SHOW_FPS ? '&fps' : ''));
  if (!SHOW_FPS) document.getElementById('tag').textContent = 'tau · premium spike — drag to orbit';
}
applyTheme(THEME);

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
});

let frames = 0, fpsAcc = 0, fpsN = 0, lastT = performance.now();
const tag = document.getElementById('tag');
function loop() {
  requestAnimationFrame(loop);
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastT)/1000);   // clamp: a background tab must not fast-forward the sim
  simTick(dt);
  syncPieces();
  controls.update();
  composer.render();
  if (SHOW_FPS) {
    fpsAcc += 1000 / Math.max(1, now - lastT); fpsN++;
    if (fpsN >= 30) { tag.textContent = `tau · ${THEME} · ${(fpsAcc/fpsN).toFixed(0)} fps`; fpsAcc = fpsN = 0; }
  }
  lastT = now;
  if (++frames === 6) window.__spikeReady = true;   // headless screenshot hook
}
loop();
</script>
</body>
